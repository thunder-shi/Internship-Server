# 仅用于服务器（或本机整目录联调）：与 Internship-Front、Internship-NewBack 同级，在本目录执行 docker compose
# 使用：cp .env.example .env 并修改密码后 → docker compose up -d --build
name: internship

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-internship}
    volumes:
      - internship_mysql_data:/var/lib/mysql
    networks:
      - internship_net
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - internship_redis_data:/data
    networks:
      - internship_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - internship_minio_data:/data
    networks:
      - internship_net

  kkfileview:
    image: keking/kkfileview:4.4.0
    restart: unless-stopped
    depends_on:
      - minio
    networks:
      - internship_net

  newback:
    build:
      context: ../Internship-NewBack
      dockerfile: Dockerfile
    image: internship-newback:local
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-internship}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESSKEY: ${MINIO_ROOT_USER}
      MINIO_SECRETKEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKETNAME: ${MINIO_BUCKET:-internship}
    networks:
      - internship_net

  front:
    build:
      context: ../Internship-Front
      dockerfile: Dockerfile
      args:
        VITE_KKFILEVIEW_BASE: ${VITE_KKFILEVIEW_BASE:-}
    image: internship-front:local
    restart: unless-stopped
    networks:
      - internship_net

  nginx:
    image: nginx:1.26-alpine
    restart: unless-stopped
    depends_on:
      - front
      - newback
      - kkfileview
    ports:
      - "${HTTP_PUBLISH:-80}:80"
    volumes:
      - ./docker/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internship_net

volumes:
  internship_mysql_data:
  internship_redis_data:
  internship_minio_data:

networks:
  internship_net:
    driver: bridge
